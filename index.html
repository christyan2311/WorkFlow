<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meu Ponto" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>Meu Ponto</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">⏱</span>
          <span class="logo-text">Meu Ponto</span>
        </div>
      </div>
    </header>

    <nav class="tab-bar">
      <button class="tab active" data-tab="hoje" onclick="showTab('hoje')">Hoje</button>
      <button class="tab" data-tab="historico" onclick="showTab('historico')">Histórico</button>
    </nav>

    <main class="main-content">
      <!-- VIEW: HOJE -->
      <div id="view-hoje" class="view active">
        <div class="date-bar">
          <button class="date-nav" onclick="changeDate(-1)" aria-label="Dia anterior">&#8592;</button>
          <span id="current-date-label" class="date-label"></span>
          <button class="date-nav" onclick="changeDate(1)" aria-label="Próximo dia">&#8594;</button>
        </div>

        <div class="slots-grid">
          <div class="slot" id="slot-entrada" onclick="openCamera('entrada')" role="button" tabindex="0">
            <div class="slot-icon">🕐</div>
            <div class="slot-label">Entrada</div>
          </div>
          <div class="slot" id="slot-inicio_almoco" onclick="openCamera('inicio_almoco')" role="button" tabindex="0">
            <div class="slot-icon">🍽</div>
            <div class="slot-label">Início almoço</div>
          </div>
          <div class="slot" id="slot-fim_almoco" onclick="openCamera('fim_almoco')" role="button" tabindex="0">
            <div class="slot-icon">☕</div>
            <div class="slot-label">Fim almoço</div>
          </div>
          <div class="slot" id="slot-saida" onclick="openCamera('saida')" role="button" tabindex="0">
            <div class="slot-icon">🚪</div>
            <div class="slot-label">Saída</div>
          </div>
        </div>

        <p class="camera-hint">Toque em cada quadro para fotografar o ticket</p>

        <div class="summary-card">
          <div class="summary-row">
            <span class="summary-key">Entrada</span>
            <span class="summary-val" id="s-entrada">--:--</span>
          </div>
          <div class="summary-row">
            <span class="summary-key">Início almoço</span>
            <span class="summary-val" id="s-inicio_almoco">--:--</span>
          </div>
          <div class="summary-row">
            <span class="summary-key">Fim almoço</span>
            <span class="summary-val" id="s-fim_almoco">--:--</span>
          </div>
          <div class="summary-row">
            <span class="summary-key">Saída</span>
            <span class="summary-val" id="s-saida">--:--</span>
          </div>
          <div class="summary-divider"></div>
          <div class="summary-row summary-total">
            <span class="summary-key">Total trabalhado</span>
            <span class="summary-val" id="s-total">--h --min</span>
          </div>
        </div>

        <button class="export-btn" onclick="exportDay()">
          💾 Exportar registro do dia (.csv)
        </button>
      </div>

      <!-- VIEW: HISTÓRICO -->
      <div id="view-historico" class="view">
        <div class="history-list" id="history-list">
          <p class="empty-state">Nenhum registro ainda.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Input de câmera — oculto -->
  <input type="file" id="file-input" accept="image/*" capture="environment" aria-hidden="true" />

  <!-- Modal de detalhe do dia -->
  <div class="modal-overlay hidden" id="modal" onclick="closeModal(this, event)">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-slots" id="modal-slots"></div>
      <button class="export-btn" id="modal-export-btn" style="margin-top:1rem;">
        💾 Exportar este dia (.csv)
      </button>
    </div>
  </div>

  <script src="/src/app.js"></script>
</body>
</html>
